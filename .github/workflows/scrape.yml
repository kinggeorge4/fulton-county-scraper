name: Scrape Fulton County Records

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/fetch.py
        env:
          LOOKBACK_DAYS: '7'
          PYTHONUNBUFFERED: '1'

      - name: Commit and push results
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add dashboard/records.json data/records.json || true
          git diff --staged --quiet || git commit -m "chore: update records $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  deploy:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
