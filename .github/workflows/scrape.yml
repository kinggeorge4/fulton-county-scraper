name: Scrape Fulton County Motivated Sellers

on:
  schedule:
    # Run daily at 7:00 AM UTC (3 AM ET)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back (default: 7)"
        required: false
        default: "7"
      counties:
        description: |
          Comma-separated GA county names, or ALL for all 159 counties.
          Default = George's 6 target counties.
          Examples: ALL | FULTON,DEKALB,HENRY | FULTON,COBB,GWINNETT,CLAYTON,DOUGLAS,HOUSTON
        required: false
        default: "FULTON,CLAYTON,HOUSTON,COBB,GWINNETT,DOUGLAS"
      headless:
        description: "Run browser headless (true/false)"
        required: false
        default: "true"

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      # ── Playwright setup ───────────────────────────────────────────────────
      - name: Install Playwright Chromium + system deps
        run: python -m playwright install --with-deps chromium

      # ── Run scraper ────────────────────────────────────────────────────────
      - name: Run Fulton County scraper
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
          COUNTIES: ${{ github.event.inputs.counties || 'FULTON,CLAYTON,HOUSTON,COBB,GWINNETT,DOUGLAS' }}
          HEADLESS: ${{ github.event.inputs.headless || 'true' }}
          PYTHONUNBUFFERED: "1"
        run: python scraper/fetch.py

      # ── Commit outputs ─────────────────────────────────────────────────────
      - name: Commit updated records.json files
        run: |
          git config --local user.email "atlas-bot@propstor.com"
          git config --local user.name "Atlas Scraper Bot"
          git add dashboard/records.json data/records.json data/ghl_export.csv || true
          git diff --cached --quiet || git commit -m "🤖 Auto-update: Fulton County leads $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

  # ── Deploy dashboard to GitHub Pages ─────────────────────────────────────
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }} # pick up the freshly committed records.json
          fetch-depth: 1

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/ # serves index.html + records.json

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
