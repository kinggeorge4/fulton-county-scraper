name: Scrape Fulton County Motivated Sellers

on:
  schedule:
    # Run daily at 7:00 AM UTC (3 AM ET)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back (default: 7)"
        required: false
        default: "7"
      counties:
        description: |
          Comma-separated GA county names, or ALL for all 159 counties.
          Default = George's 6 target counties.
          Examples: ALL | FULTON,DEKALB,HENRY | FULTON,COBB,GWINNETT,CLAYTON,DOUGLAS,HOUSTON
        required: false
        default: "FULTON,CLAYTON,HOUSTON,COBB,GWINNETT,DOUGLAS"
      headless:
        description: "Run browser headless (true/false)"
        required: false
        default: "true"

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      # ── Playwright setup ───────────────────────────────────────────────────
      - name: Install Playwright Chromium + system deps
        run: python -m playwright install --with-deps chromium

      # ── Run scraper ────────────────────────────────────────────────────────
      - name: Run Fulton County scraper
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
          COUNTIES: ${{ github.event.inputs.counties || 'FULTON,CLAYTON,HOUSTON,COBB,GWINNETT,DOUGLAS' }}
          HEADLESS: ${{ github.event.inputs.headless || 'true' }}
          PYTHONUNBUFFERED: "1"
          GSCCCA_USERNAME: ${{ secrets.GSCCCA_USERNAME }}
          GSCCCA_PASSWORD: ${{ secrets.GSCCCA_PASSWORD }}
        run: python scraper/fetch.py

      # ── Commit & push outputs ──────────────────────────────────────────────
      - name: Commit and push records
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "atlas-bot@propstor.com"
          git config --local user.name "Atlas Scraper Bot"

          # Stage output files (ignore if missing)
          git add dashboard/records.json data/records.json data/ghl_export.csv 2>/dev/null || true

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit – records unchanged since last run"
            exit 0
          fi

          git commit -m "🤖 Auto-update: GA motivated seller leads $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Pull any remote changes that arrived since checkout, then push
          git pull --rebase origin main
          git push origin HEAD:main

  # ── Deploy dashboard to GitHub Pages ─────────────────────────────────────
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }} # pick up the freshly committed records.json
          fetch-depth: 1

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/ # serves index.html + records.json

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
